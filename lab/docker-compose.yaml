services:
  rs1:
    image: pierky/bird:2.0.8
    volumes:
      - ./bird/rs1-bird.conf:/etc/bird/bird.conf
    command: bird -c /etc/bird/bird.conf -d
    networks:
      birdnet:
        ipv4_address: 10.123.123.10
        ipv6_address: 2001:db8:123::10

  rs2:
    image: pierky/bird:2.0.8
    volumes:
      - ./bird/rs2-bird.conf:/etc/bird/bird.conf
    command: bird -c /etc/bird/bird.conf -d
    environment:
      - BIRD_VERSION=2.0.8
    networks:
      birdnet:
        ipv4_address: 10.123.123.20
        ipv6_address: 2001:db8:123::20

