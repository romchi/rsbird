  bird-1.6.8v4:
    image: pierky/bird:1.6.8
    volumes:
      - ./bird/bird-1.6.8v4.conf:/etc/bird/bird.conf
      - ./run:/usr/local/var/run/
    command: bird -c /etc/bird/bird.conf -s /usr/local/var/run/b168v4.ctl -d
    # entrypoint: /scripts/entrypoint.sh
    environment:
      - BIRD_VERSION=1.6.8
    depends_on:
      - rs1
      - rs2
    networks:
      birdnet:
        ipv4_address: 10.123.123.68
  bird-1.6.8v6:
    image: pierky/bird:1.6.8
    volumes:
      - ./bird/bird-1.6.8v6.conf:/etc/bird/bird.conf
      - ./run:/usr/local/var/run/
    command: bird6 -c /etc/bird/bird.conf -s /usr/local/var/run/b168v6.ctl -d
    # entrypoint: /scripts/entrypoint.sh
    environment:
      - BIRD_VERSION=1.6.8
    depends_on:
      - rs1
      - rs2
    networks:
      birdnet:
        ipv4_address: 10.123.123.168
        ipv6_address: 2001:db8:123::68
