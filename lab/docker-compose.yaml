        ipv4_address: 10.123.123.31
        ipv6_address: 2001:db8:123::31

networks:
  birdnet:
    driver: bridge
    enable_ipv6: true
    ipam:
     config:
       - subnet: 10.123.123.0/24
       - subnet: 2001:db8:123::/64
