# =============================================================================
# bird-2.0.8.conf — test BIRD 2.0.8 instance.
#
# Receives routes from rs1 (AS65010) and rs2 (AS65020). An import filter
# rejects one prefix from rs1 so `show route filtered rs1_ipv4` has data,
# and `import keep filtered` makes those rejected routes queryable. Sessions
# also `export all` back to rs1/rs2 so `show route export` is non-empty.
# =============================================================================

define RTR_IP  = 10.123.123.208;
define RTR_ASN = 65208;

router id RTR_IP;
log syslog all;
debug protocols all;

protocol device {}
protocol direct direct4 { ipv4; }
protocol direct direct6 { ipv6; }
protocol kernel kernel4 { ipv4; learn; }
protocol kernel kernel6 { ipv6; learn; }
protocol static static4 { ipv4; }
protocol static static6 { ipv6; }

# Per-AF reject filter — BIRD requires every prefix in a set to belong to
# the same address family.
filter reject_test_filtered_v4 {
    if net ~ [ 10.52.0.0/24 ] then reject;
    accept;
}
filter reject_test_filtered_v6 {
    if net ~ [ 2001:db8:52::/48 ] then reject;
    accept;
}

protocol bgp rs1_ipv4 {
    source address RTR_IP;
    local as RTR_ASN;
    neighbor 10.123.123.10 as 65010;
    ipv4 {
        import filter reject_test_filtered_v4;
        import keep filtered;
        export all;
    };
}
protocol bgp rs2_ipv4 {
    source address RTR_IP;
    local as RTR_ASN;
    neighbor 10.123.123.20 as 65020;
    ipv4 {
        import all;
        export all;
    };
}
protocol bgp rs1_ipv6 {
    source address 2001:db8:123::208;
    local as RTR_ASN;
    neighbor 2001:db8:123::10 as 65010;
    ipv6 {
        import filter reject_test_filtered_v6;
        import keep filtered;
        export all;
    };
}
protocol bgp rs2_ipv6 {
    source address 2001:db8:123::208;
    local as RTR_ASN;
    neighbor 2001:db8:123::20 as 65020;
    ipv6 {
        import all;
        export all;
    };
}
