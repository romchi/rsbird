# =============================================================================
# bird-1.6.8v4.conf — test BIRD 1.6.8 IPv4 daemon.
#
# BIRD 1.6 has separate v4 / v6 daemons, no channel blocks, and filter /
# `import keep filtered` declarations live directly at the protocol level.
# =============================================================================

define RTR_IP  = 10.123.123.68;
define RTR_ASN = 65068;

router id RTR_IP;
log syslog all;
debug protocols all;

protocol device {}
protocol direct {}
protocol kernel { export all; learn; }
protocol static { import all; export all; }

filter reject_test_filtered {
    if net ~ [ 10.52.0.0/24 ] then reject;
    accept;
}

protocol bgp rs1_ipv4 {
    source address RTR_IP;
    local as RTR_ASN;
    neighbor 10.123.123.10 as 65010;
    import filter reject_test_filtered;
    export all;
    import keep filtered;
}
protocol bgp rs2_ipv4 {
    source address RTR_IP;
    local as RTR_ASN;
    neighbor 10.123.123.20 as 65020;
    import all;
    export all;
}
