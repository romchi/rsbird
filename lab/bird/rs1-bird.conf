# =============================================================================
# rs1-bird.conf — synthetic upstream peer 1 (AS65010) for the rsbird lab.
#
# This peer originates a curated set of routes designed to exercise every
# edge case the rsbird parsers must handle: each community flavour, mixes,
# next-hop variety, long AS-path via prepends, and a prefix that overlaps
# with rs2 (for best-path selection on the test BIRDs).
#
# Image: pierky/bird:2.0.8
# =============================================================================

define RTR_ASN = 65010;
define RTR_IP  = 10.123.123.10;

router id RTR_IP;
log syslog all;
debug protocols all;

protocol device {}
protocol direct direct4 { ipv4; }
protocol direct direct6 { ipv6; }

protocol kernel kernel4 { ipv4 { export all; }; learn; }
protocol kernel kernel6 { ipv6 { export all; }; learn; }

# -----------------------------------------------------------------------------
# Local routing table — every test prefix lives here as a static route and
# gets re-announced via BGP to the test BIRDs.
# -----------------------------------------------------------------------------

protocol static static4 {
    ipv4 { import all; export all; };

    # --- non-BGP type variety (next-hop kinds) ---------------------------
    route 10.0.0.0/24   blackhole;
    route 10.1.1.0/24   unreachable;
    route 10.2.2.0/24   via "eth0";
    route 10.3.3.0/24   via 10.123.123.10;
    route 10.4.4.0/24   prohibit;

    # --- community / attribute variety -----------------------------------
    # standard communities only
    route 10.5.5.0/24   via 10.123.123.10 {
        bgp_community.add((65010, 1));
        bgp_community.add((65010, 2));
        bgp_community.add((65010, 3));
        bgp_med = 150;
    };

    # many standard communities incl. well-known NO_EXPORT
    route 10.6.0.0/24   via 10.123.123.10 {
        bgp_community.add((0, 12989));
        bgp_community.add((0, 13188));
        bgp_community.add((0, 13335));
        bgp_community.add((65010, 9999));
        bgp_community.add((65535, 65281));    # NO_EXPORT
    };

    # large communities only
    route 10.7.0.0/24   via 10.123.123.10 {
        bgp_large_community.add((65010, 1, 2));
        bgp_large_community.add((65010, 100, 200));
        bgp_large_community.add((65010, 999, 1000));
    };

    # extended communities only (rt + ro)
    route 10.8.0.0/24   via 10.123.123.10 {
        bgp_ext_community.add((rt, 65010, 1));
        bgp_ext_community.add((rt, 65010, 2));
        bgp_ext_community.add((ro, 65010, 100));
    };

    # all three community kinds together + MED
    route 10.9.0.0/24   via 10.123.123.10 {
        bgp_community.add((65010, 1));
        bgp_community.add((65010, 2));
        bgp_large_community.add((65010, 1, 2));
        bgp_large_community.add((65010, 100, 200));
        bgp_ext_community.add((rt, 65010, 3));
        bgp_med = 50;
    };

    # long AS-path target — the bgp_to_test filter prepends on export
    route 10.10.0.0/24  via 10.123.123.10;

    # overlap with rs2 — both announce this; rs1 wins via lower MED
    route 10.50.0.0/24  via 10.123.123.10 {
        bgp_med = 100;
        bgp_community.add((65010, 50));
    };

    # this one will be rejected by the test BIRD's import filter
    # (so `show route filtered rs1_ipv4` has content)
    route 10.52.0.0/24  via 10.123.123.10 {
        bgp_community.add((65010, 666));
    };
}

protocol static static6 {
    ipv6 { import all; export all; };

    route 2001:db8:0::/48   blackhole;
    route 2001:db8:1::/48   unreachable;
    route 2001:db8:2::/48   via "eth0";
    route 2001:db8:3::/48   via 2001:db8:123::10;
    route 2001:db8:4::/48   prohibit;

    route 2001:db8:5::/48   via 2001:db8:123::10 {
        bgp_community.add((65010, 1));
        bgp_community.add((65010, 2));
        bgp_community.add((65010, 3));
        bgp_med = 150;
    };

    route 2001:db8:6::/48   via 2001:db8:123::10 {
        bgp_community.add((0, 12989));
        bgp_community.add((0, 13188));
        bgp_community.add((0, 13335));
        bgp_community.add((65535, 65281));
    };

    route 2001:db8:7::/48   via 2001:db8:123::10 {
        bgp_large_community.add((65010, 1, 2));
        bgp_large_community.add((65010, 100, 200));
        bgp_large_community.add((65010, 999, 1000));
    };

    route 2001:db8:8::/48   via 2001:db8:123::10 {
        bgp_ext_community.add((rt, 65010, 1));
        bgp_ext_community.add((rt, 65010, 2));
        bgp_ext_community.add((ro, 65010, 100));
    };

    route 2001:db8:9::/48   via 2001:db8:123::10 {
        bgp_community.add((65010, 1));
        bgp_large_community.add((65010, 1, 2));
        bgp_ext_community.add((rt, 65010, 3));
        bgp_med = 50;
    };

    route 2001:db8:10::/48  via 2001:db8:123::10;

    route 2001:db8:50::/48  via 2001:db8:123::10 {
        bgp_med = 100;
        bgp_community.add((65010, 50));
    };

    route 2001:db8:52::/48  via 2001:db8:123::10 {
        bgp_community.add((65010, 666));
    };
}

# -----------------------------------------------------------------------------
# Export filter to test BIRDs — selectively manipulates BGP attributes
# per prefix so we have meaningful, varied data in each test case.
# -----------------------------------------------------------------------------

# Per-AF export filter: BIRD's prefix sets are homogeneous (v4 OR v6), so
# the same logic lives in two filters and each channel applies its own.
filter bgp_to_test_v4 {
    # Long AS-path: prepend a few ASNs (BIRD adds RTR_ASN on eBGP egress
    # itself, so the receiver sees a multi-hop path).
    if net ~ [ 10.10.0.0/24 ] then {
        bgp_path.prepend(64500);
        bgp_path.prepend(64500);
        bgp_path.prepend(64500);
        bgp_path.prepend(65010);
    }
    accept;
}
filter bgp_to_test_v6 {
    if net ~ [ 2001:db8:10::/48 ] then {
        bgp_path.prepend(64500);
        bgp_path.prepend(64500);
        bgp_path.prepend(64500);
        bgp_path.prepend(65010);
    }
    accept;
}

# -----------------------------------------------------------------------------
# BGP sessions to the test BIRDs (one per version we care about).
# `next hop self` makes rs1's IP the next-hop on the receiver side, which
# matters because some of our static routes have a `via` that wouldn't be
# directly reachable from the test container otherwise.
# -----------------------------------------------------------------------------

protocol bgp rs2_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.20 as 65020;
    ipv4 { import all; export all; };
}
protocol bgp rs2_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::10;
    neighbor 2001:db8:123::20 as 65020;
    ipv6 { import all; export all; };
}

protocol bgp bird_168_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.68 as 65068 external;
    ipv4 {
        import all;
        export filter bgp_to_test_v4;
        next hop self;
    };
}
protocol bgp bird_168_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::10;
    neighbor 2001:db8:123::68 as 65068 external;
    ipv6 {
        import all;
        export filter bgp_to_test_v6;
        next hop self;
    };
}

protocol bgp bird_208_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.208 as 65208 external;
    ipv4 {
        import all;
        export filter bgp_to_test_v4;
        next hop self;
    };
}
protocol bgp bird_208_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::10;
    neighbor 2001:db8:123::208 as 65208 external;
    ipv6 {
        import all;
        export filter bgp_to_test_v6;
        next hop self;
    };
}

protocol bgp bird_312_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.31 as 65231 external;
    ipv4 {
        import all;
        export filter bgp_to_test_v4;
        next hop self;
    };
}
protocol bgp bird_312_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::10;
    neighbor 2001:db8:123::31 as 65231 external;
    ipv6 {
        import all;
        export filter bgp_to_test_v6;
        next hop self;
    };
}
