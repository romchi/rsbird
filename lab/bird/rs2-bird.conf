# =============================================================================
# rs2-bird.conf — synthetic upstream peer 2 (AS65020) for the rsbird lab.
#
# rs2's purpose: announce a small set of routes that includes one prefix
# *also* announced by rs1 (10.50.0.0/24 + 2001:db8:50::/48) plus one
# rs2-unique prefix. This gives the test BIRDs multi-source data so we can
# parse "best" vs non-best paths and verify per-protocol filtering.
#
# Image: pierky/bird:2.0.8
# =============================================================================

define RTR_ASN = 65020;
define RTR_IP  = 10.123.123.20;

router id RTR_IP;
log syslog all;
debug protocols all;

protocol device {}
protocol direct direct4 { ipv4; }
protocol direct direct6 { ipv6; }

protocol kernel kernel4 { ipv4 { export all; }; learn; }
protocol kernel kernel6 { ipv6 { export all; }; learn; }

protocol static static4 {
    ipv4 { import all; export all; };

    # Same prefix as rs1 announces — for best-path testing. rs2 uses a
    # higher MED so rs1's announcement wins; rs2's stays as a secondary.
    route 10.50.0.0/24  via 10.123.123.20 {
        bgp_med = 200;
        bgp_community.add((65020, 1));
    };

    # rs2-unique prefix with its own attribute mix.
    route 10.51.0.0/24  via 10.123.123.20 {
        bgp_community.add((65020, 100));
        bgp_community.add((65020, 200));
        bgp_large_community.add((65020, 1, 2));
    };
}

protocol static static6 {
    ipv6 { import all; export all; };

    route 2001:db8:50::/48  via 2001:db8:123::20 {
        bgp_med = 200;
        bgp_community.add((65020, 1));
    };

    route 2001:db8:51::/48  via 2001:db8:123::20 {
        bgp_community.add((65020, 100));
        bgp_large_community.add((65020, 1, 2));
    };
}

# rs1 ↔ rs2 peering kept passive (no exchange) — we only need them to
# announce to the test BIRDs.
protocol bgp rs1_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.10 as 65010;
    ipv4 { import all; export none; };
}
protocol bgp rs1_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::20;
    neighbor 2001:db8:123::10 as 65010;
    ipv6 { import all; export none; };
}

# Sessions to the test BIRDs — announce everything we have.
protocol bgp bird_168_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.68 as 65068 external;
    ipv4 { import all; export all; next hop self; };
}
protocol bgp bird_168_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::20;
    neighbor 2001:db8:123::68 as 65068 external;
    ipv6 { import all; export all; next hop self; };
}

protocol bgp bird_208_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.208 as 65208 external;
    ipv4 { import all; export all; next hop self; };
}
protocol bgp bird_208_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::20;
    neighbor 2001:db8:123::208 as 65208 external;
    ipv6 { import all; export all; next hop self; };
}

protocol bgp bird_312_ipv4 {
    local as RTR_ASN;
    source address RTR_IP;
    neighbor 10.123.123.31 as 65231 external;
    ipv4 { import all; export all; next hop self; };
}
protocol bgp bird_312_ipv6 {
    local as RTR_ASN;
    source address 2001:db8:123::20;
    neighbor 2001:db8:123::31 as 65231 external;
    ipv6 { import all; export all; next hop self; };
}
