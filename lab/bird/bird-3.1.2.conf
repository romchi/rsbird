# =============================================================================
# bird-3.1.2.conf — test BIRD 3.1.2 instance.
#
# Same shape as bird-2.0.8.conf (channel blocks); BIRD 3 keeps the 2.x
# syntax for these directives but enriches the CLI output (extra columns
# in route change stats, `Created:` / `Import state:` / `Export state:`
# lines). That difference is what we want to exercise in the parsers.
# =============================================================================

define RTR_IP  = 10.123.123.31;
define RTR_ASN = 65231;

router id RTR_IP;
log syslog all;
debug protocols all;

protocol device {}
protocol direct direct4 { ipv4; }
protocol direct direct6 { ipv6; }
protocol kernel kernel4 { ipv4; learn; }
protocol kernel kernel6 { ipv6; learn; }
protocol static static4 { ipv4; }
protocol static static6 { ipv6; }

# BIRD requires a prefix set to be all-v4 or all-v6, so the import filter
# is split per address family and applied on each channel accordingly.
filter reject_test_filtered_v4 {
    if net ~ [ 10.52.0.0/24 ] then reject;
    accept;
}
filter reject_test_filtered_v6 {
    if net ~ [ 2001:db8:52::/48 ] then reject;
    accept;
}

protocol bgp rs1_ipv4 {
    source address RTR_IP;
    local as RTR_ASN;
    neighbor 10.123.123.10 as 65010;
    ipv4 {
        import filter reject_test_filtered_v4;
        import keep filtered;
        export all;
    };
}
protocol bgp rs2_ipv4 {
    source address RTR_IP;
    local as RTR_ASN;
    neighbor 10.123.123.20 as 65020;
    ipv4 {
        import all;
        export all;
    };
}
protocol bgp rs1_ipv6 {
    source address 2001:db8:123::31;
    local as RTR_ASN;
    neighbor 2001:db8:123::10 as 65010;
    ipv6 {
        import filter reject_test_filtered_v6;
        import keep filtered;
        export all;
    };
}
protocol bgp rs2_ipv6 {
    source address 2001:db8:123::31;
    local as RTR_ASN;
    neighbor 2001:db8:123::20 as 65020;
    ipv6 {
        import all;
        export all;
    };
}
